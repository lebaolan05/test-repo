<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Name Card Generator</h1>

    <form action="save.php" method="POST">
        <input name="name" placeholder="Name">
        <input name="title" placeholder="Title">
        <input name="email" placeholder="Email">
        <input name="phone" placeholder="Phone">
        <button type="submit">Save Card</button>
    </form>

    <button onclick="generateCard()">Generate</button>

    <div class="card" id="card">
        <h2 id="cardName">Your Name</h2>
        <p id="cardTitle">Your Title</p>
        <p id="cardEmail">your@email.com</p>
        <p id="cardPhone">0123456789</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
