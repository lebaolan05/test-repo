# ================================================================
# SocialNet — Nginx Configuration
# Place this file in: /etc/nginx/sites-available/socialnet
# Then: ln -s /etc/nginx/sites-available/socialnet /etc/nginx/sites-enabled/
# ================================================================

server {
    listen       80;
    listen       [::]:80;
    server_name  localhost;          # Change to your domain if needed

    # Root of the project (adjust to where you cloned the repo)
    root         /var/www/socialnet-app;

    index        index.php index.html;

    charset      utf-8;

    # ── Logging ───────────────────────────────────────────────
    access_log  /var/log/nginx/socialnet_access.log;
    error_log   /var/log/nginx/socialnet_error.log;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # ── Static assets (CSS, fonts, images) ───────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires     30d;
        add_header  Cache-Control "public, no-transform";
        try_files   $uri =404;
    }

    # ── PHP handler ───────────────────────────────────────────
    location ~ \.php$ {
        try_files      $uri =404;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;   # Adjust PHP version if needed
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # Increase timeouts for longer operations
        fastcgi_connect_timeout  60s;
        fastcgi_send_timeout     60s;
        fastcgi_read_timeout     60s;
    }

    # ── Route: /admin ─────────────────────────────────────────
    location /admin {
        try_files $uri $uri/ /admin/newuser.php?$query_string;
    }

    # ── Route: /socialnet ─────────────────────────────────────
    location /socialnet {
        try_files $uri $uri/ /socialnet/index.php?$query_string;
    }

    # ── Deny hidden files (.htaccess, .env, etc.) ────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Default — root redirect ───────────────────────────────
    location = / {
        return 302 /socialnet/signin.php;
    }
}
